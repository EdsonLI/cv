name: Deploy CV to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build site and PDF
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        shell: bash
        run: |
          set -euo pipefail

          rm -rf _site
          mkdir -p _site/assets/files

          cp index.html _site/index.html
          cp .nojekyll _site/.nojekyll
          cp -R assets/css _site/assets/css
          cp -R assets/js _site/assets/js
          cp -R assets/img _site/assets/img

      - name: Generate PDF curriculum
        shell: bash
        run: |
          set -euo pipefail

          cp _site/index.html _site/print.html
          sed -i 's/<details class="timeline-more reveal">/<details class="timeline-more reveal" open>/' _site/print.html

          BROWSER="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"

          if [ -z "$BROWSER" ]; then
            sudo apt-get update
            sudo apt-get install -y chromium
            BROWSER="$(command -v chromium)"
          fi

          "$BROWSER" \
            --headless \
            --no-sandbox \
            --disable-gpu \
            --allow-file-access-from-files \
            --no-pdf-header-footer \
            --timeout=10000 \
            --print-to-pdf="${GITHUB_WORKSPACE}/_site/assets/files/Curriculo_Edson_Luis_Isele.pdf" \
            "file://${GITHUB_WORKSPACE}/_site/print.html"

          rm _site/print.html
          test -s _site/assets/files/Curriculo_Edson_Luis_Isele.pdf

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
